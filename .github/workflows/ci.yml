name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest
      - name: Regression gate
        run: eval-harness --fixture fixtures/golden/sample.json --k 3 --min-recall 0.5 --min-hit-rate 0.5
